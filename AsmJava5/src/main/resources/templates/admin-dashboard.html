<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/post.css}">
    <style>
        .report-card {
            background-color: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .report-header h4 {
            margin: 0;
            color: #ff4757;
            font-weight: 700;
        }

        .report-reason {
            background-color: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .post-preview {
            background-color: #0e0e10;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .post-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 6px;
            object-fit: cover;
        }

        .post-details {
            flex-grow: 1;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            border-top: 1px solid #2a2a35;
            padding-top: 16px;
        }

        .btn-keep {
            background-color: #2a2a35;
            color: #fff;
            border: none;
        }

        .btn-keep:hover {
            background-color: #353545;
            color: #fff;
        }

        .btn-warn {
            background-color: #ffa502;
            color: #fff;
            border: none;
        }

        .btn-warn:hover {
            background-color: #e59400;
            color: #fff;
        }

        .btn-lock {
            background-color: #ff4757;
            color: #fff;
            border: none;
        }

        .btn-lock:hover {
            background-color: #e03c4a;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="top-navbar"
        style="border-bottom: 1px solid #2a2a35; padding: 12px 20px; display: flex; align-items: center;">
        <a class="brand" th:href="@{/home}"
            style="font-size: 1.5rem; font-weight: 800; color: #a855f7; text-decoration: none;">✦ SocialApp</a>
        <div class="flex-grow-1 text-center">
            <span style="font-size: 1.2rem; font-weight: 700; color: #fff;">Quản Trị Hệ Thống (Admin)</span>
        </div>
        <a th:href="@{/home}" class="nav-back"><i class="bi bi-arrow-left me-1"></i>Trang chủ</a>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5" style="max-width: 900px;">
        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert"
            style="background-color: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid #2ed573;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <div th:text="${success}"></div>
        </div>
        <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert"
            style="background-color: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid #ff4757;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <div th:text="${error}"></div>
        </div>

        <h2 class="mb-4 text-white"><i class="bi bi-shield-exclamation me-2" style="color:#ff4757;"></i>Danh sách báo
            cáo cần xử lý</h2>

        <div th:if="${reports == null or reports.empty}" class="text-center py-5"
            style="background-color: #1a1a1f; border-radius: 12px; border: 1px solid #2a2a35;">
            <i class="bi bi-shield-check" style="font-size: 4rem; color: #2ed573; opacity: 0.8;"></i>
            <h4 class="mt-3 text-white">Tuyệt vời!</h4>
            <p style="color: #aaa;">Không có báo cáo nào đang chờ xử lý.</p>
        </div>

        <!-- Render Reports -->
        <div th:each="report : ${reports}" class="report-card">
            <!-- Header -->
            <div class="report-header">
                <h4><i class="bi bi-flag-fill me-2"></i>Báo cáo #<span th:text="${report.id}">1</span></h4>
                <div class="text-muted" style="font-size: 0.9rem;">
                    Báo cáo bởi: <a th:href="@{/profile/view/{id}(id=${report.reporter.id})}"
                        style="color: #a855f7; text-decoration: none; font-weight: 600;">@<span
                            th:text="${report.reporter.username}">user</span></a>
                    vào lúc <span th:text="${#temporals.format(report.createdAt, 'dd/MM/yyyy HH:mm')}">Time</span>
                </div>
            </div>

            <!-- Reason -->
            <div class="report-reason">
                <i class="bi bi-exclamation-circle-fill me-2"></i>Lý do báo cáo: <span
                    th:text="${report.reason}">Spam</span>
            </div>

            <!-- Post Preview -->
            <div class="post-preview" th:if="${report.post != null}">
                <img th:if="${report.post.imageData != null}" th:src="@{/upload/image/{id}(id=${report.post.id})}"
                    alt="Post Image">
                <img th:if="${report.post.imageData == null && report.post.imageUrl != null}"
                    th:src="${report.post.imageUrl}" alt="Post Image">

                <div class="post-details">
                    <h5 class="text-white mb-2" th:text="${report.post.title}">Tiêu đề</h5>
                    <p style="color: #aaa; margin-bottom: 10px;" th:text="${report.post.content}">Nội dung</p>
                    <div style="font-size: 0.85rem; color: #888;">
                        <span class="me-3"><i class="bi bi-person me-1"></i>Người đăng: <a
                                th:href="@{/profile/view/{id}(id=${report.post.user.id})}"
                                style="color: #a855f7; text-decoration: none;">@<span
                                    th:text="${report.post.user.username}">author</span></a></span>
                        <span class="me-3"><i class="bi bi-exclamation-triangle me-1"></i>Số lần cảnh cáo: <span
                                th:text="${report.post.user.warningCount}"
                                style="color: #ffa502; font-weight: 700;">0</span></span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="action-buttons">
                <!-- Keep Post Button -->
                <form th:action="@{/admin/reports/{id}/keep(id=${report.id})}" method="post">
                    <button type="submit" class="btn btn-keep rounded-pill px-4 fw-bold">
                        <i class="bi bi-check-circle me-1"></i>Giữ lại bài viết
                    </button>
                </form>

                <!-- Delete & Warn Button -->
                <form th:action="@{/admin/reports/{id}/delete-warn(id=${report.id})}" method="post"
                    onsubmit="return confirm('Bạn có chắc muốn XÓA bài viết này và CẢNH CÁO người dùng?');">
                    <button type="submit" class="btn btn-warn rounded-pill px-4 fw-bold">
                        <i class="bi bi-trash-fill me-1"></i>Xóa bài & Cảnh cáo
                    </button>
                </form>

                <!-- Lock Account Button -->
                <form th:action="@{/admin/reports/{id}/lock(id=${report.id})}" method="post"
                    onsubmit="return confirm('CẢNH BÁO: Hành động này sẽ khóa vĩnh viễn tài khoản người dùng và xóa bài viết. Bạn có chắc không?');">
                    <button type="submit" class="btn btn-lock rounded-pill px-4 fw-bold">
                        <i class="bi bi-lock-fill me-1"></i>Khóa tài khoản
                    </button>
                </form>
            </div>
        </div>

    </div>
</body>

</html>
