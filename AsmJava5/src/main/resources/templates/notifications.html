<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Social App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .notif-page {
            max-width: 680px;
            margin: 80px auto 60px;
            padding: 0 16px;
        }

        .notif-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .notif-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }

        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px;
            border-radius: 12px;
            background: #141414;
            border: 1px solid #1e1e1e;
            margin-bottom: 10px;
            text-decoration: none;
            color: inherit;
            transition: background 0.15s;
        }

        .notif-item:hover {
            background: #1a1a1a;
        }

        .notif-item.unread {
            border-left: 3px solid #e91e63;
        }

        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .icon-follow {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
        }

        .icon-new-post {
            background: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }

        .icon-comment {
            background: rgba(255, 152, 0, 0.15);
            color: #ff9800;
        }

        .icon-deleted {
            background: rgba(233, 30, 99, 0.15);
            color: #e91e63;
        }

        .icon-reported {
            background: rgba(156, 39, 176, 0.15);
            color: #9c27b0;
        }

        .notif-text {
            flex: 1;
        }

        .notif-msg {
            font-size: 0.9rem;
            color: #ddd;
            line-height: 1.4;
        }

        .notif-time {
            font-size: 0.78rem;
            color: #555;
            margin-top: 4px;
        }

        .notif-dot {
            width: 8px;
            height: 8px;
            background: #e91e63;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 1rem;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="top-navbar">
        <a class="brand" th:href="@{/home}">✦ SocialApp</a>
        <div class="nav-spacer"></div>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/profile}" class="text-decoration-none">
                <div class="avatar-nav" th:if="${sessionUser != null and sessionUser.avatarData != null}"
                    style="overflow:hidden;padding:0;">
                    <img th:src="@{/profile/avatar/{id}(id=${sessionUser.id})}"
                        style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar">
                </div>
                <div class="avatar-nav" th:if="${sessionUser == null or sessionUser.avatarData == null}"
                    th:text="${sessionUser != null ? sessionUser.username.substring(0,1).toUpperCase() : 'U'}">U
                </div>
            </a>
            <a th:href="@{/auth/logout}" class="nav-icon text-decoration-none" title="Đăng xuất">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </nav>

    <div class="notif-page">
        <a th:href="@{/home}" class="back-link">
            <i class="bi bi-arrow-left"></i> Trang chủ
        </a>

        <div class="notif-header">
            <h1><i class="bi bi-bell-fill me-2" style="color:#e91e63;"></i>Thông báo</h1>
        </div>

        <!-- Empty state -->
        <div th:if="${notifications == null or notifications.empty}" class="empty-state">
            <i class="bi bi-bell-slash"></i>
            <p>Chưa có thông báo nào</p>
        </div>

        <!-- Notification list -->
        <div th:each="n : ${notifications}">
            <a th:href="${n.link != null ? n.link : '#'}" th:class="'notif-item' + (${!n.isRead} ? ' unread' : '')">

                <!-- Icon theo type -->
                <div th:switch="${n.type}">
                    <div th:case="'FOLLOW'" class="notif-icon icon-follow"><i class="bi bi-person-plus-fill"></i></div>
                    <div th:case="'NEW_POST'" class="notif-icon icon-new-post"><i class="bi bi-image-fill"></i></div>
                    <div th:case="'COMMENT'" class="notif-icon icon-comment"><i class="bi bi-chat-fill"></i></div>
                    <div th:case="'POST_DELETED'" class="notif-icon icon-deleted"><i class="bi bi-trash-fill"></i></div>
                    <div th:case="'POST_REPORTED'" class="notif-icon icon-reported"><i class="bi bi-flag-fill"></i>
                    </div>
                    <div th:case="*" class="notif-icon icon-follow"><i class="bi bi-bell-fill"></i></div>
                </div>

                <div class="notif-text">
                    <div class="notif-msg" th:text="${n.message}">Thông báo</div>
                    <div class="notif-time" th:text="${#temporals.format(n.createdAt, 'HH:mm - dd/MM/yyyy')}">
                    </div>
                </div>

                <div class="notif-dot" th:if="${!n.isRead}"></div>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
