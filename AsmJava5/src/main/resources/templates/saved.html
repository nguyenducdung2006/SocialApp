<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài viết đã lưu - SocialApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        /* ===== SAVED PAGE STANDALONE ===== */
        body {
            min-height: 100vh;
            background: var(--bg);
        }

        .saved-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 80px 20px 48px;
            position: relative;
            z-index: 1;
        }

        /* Page header */
        .saved-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .back-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--bg3);
            color: var(--text);
            border-color: var(--accent);
        }

        .saved-title {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .saved-title i {
            color: var(--accent);
        }

        .saved-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 12px;
            font-weight: 600;
            margin-left: auto;
        }

        /* Empty state */
        .saved-empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .saved-empty i {
            font-size: 4rem;
            color: var(--accent);
            opacity: 0.3;
            display: block;
            margin-bottom: 16px;
        }

        .saved-empty h4 {
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .saved-empty p {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .saved-empty a {
            background: linear-gradient(135deg, var(--accent), #c73652);
            color: white;
            border-radius: 20px;
            padding: 10px 24px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .saved-empty a:hover {
            opacity: 0.85;
        }

        /* Grid */
        .saved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        .saved-card {
            background: var(--bg2);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .saved-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        }

        .saved-card:hover .card-img {
            filter: brightness(0.8);
        }

        .saved-card:hover .card-overlay {
            opacity: 1;
        }

        .card-img-wrap {
            position: relative;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            transition: filter 0.2s;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 50%);
            display: flex;
            align-items: flex-end;
            padding: 10px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card-stats {
            display: flex;
            gap: 10px;
        }

        .stat-chip {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-chip.likes i {
            color: var(--accent);
        }

        .stat-chip.views i {
            color: #60a5fa;
        }

        .card-body {
            padding: 10px 12px 12px;
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
            color: var(--text);
            text-decoration: none;
            display: block;
        }

        .card-title:hover {
            color: var(--accent);
        }

        .card-author {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .author-avatar-sm {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .author-dot-sm {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .author-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* No image placeholder */
        .card-no-img {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--bg3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .card-no-img i {
            font-size: 2.5rem;
            opacity: 0.3;
        }

        @media (max-width: 600px) {
            .saved-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }

            .saved-wrapper {
                padding: 70px 12px 32px;
            }
        }
    </style>
</head>

<body
    th:attr="data-homebg=${sessionUser != null and sessionUser.equippedHomeBg != null ? sessionUser.equippedHomeBg : ''}">

    <!-- Overlay mờ khi có nền -->
    <div id="homeBgOverlay"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:0;pointer-events:none;"></div>

    <!-- NAVBAR -->
    <nav class="top-navbar">
        <a class="brand" th:href="@{/home}">✦ SocialApp</a>
        <div class="search-wrap d-none d-md-flex">
            <form th:action="@{/search}" method="get" class="w-100 position-relative">
                <i class="bi bi-search"></i>
                <input type="text" name="q" class="search-input" placeholder="Tìm kiếm tác phẩm, người dùng...">
            </form>
        </div>
        <div class="nav-spacer"></div>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/notifications}" class="nav-icon text-decoration-none" id="notifBell">
                <i class="bi bi-bell"></i>
                <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
            </a>
            <a th:href="@{/chat}" th:if="${sessionUser == null or sessionUser.role != 'ADMIN'}"
                class="nav-icon text-decoration-none" id="chatNavIcon">
                <i class="bi bi-chat-dots"></i>
                <span class="notif-badge" id="msgBadge" style="display:none;background:#a855f7;"></span>
            </a>
            <!-- Admin Dashboard Link -->
            <a th:if="${sessionUser != null and sessionUser.role == 'ADMIN'}" th:href="@{/admin/reports}"
                class="nav-icon text-decoration-none" title="Admin Dashboard">
                <i class="bi bi-shield-lock-fill text-danger"></i>
            </a>
            <a th:if="${sessionUser == null or sessionUser.role != 'ADMIN'}" th:href="@{/upload}"
                class="upload-btn text-decoration-none">
                <i class="bi bi-cloud-upload"></i> Đăng tải
            </a>
            <a th:href="@{/profile}" class="text-decoration-none">
                <div class="avatar-nav" th:if="${sessionUser != null and sessionUser.avatarData != null}"
                    style="overflow:hidden;padding:0;">
                    <img th:src="@{/profile/avatar/{id}(id=${sessionUser.id})}"
                        style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="avatar">
                </div>
                <div class="avatar-nav" th:if="${sessionUser == null or sessionUser.avatarData == null}"
                    th:text="${sessionUser != null ? sessionUser.username.substring(0,1).toUpperCase() : 'U'}">U
                </div>
            </a>
            <a th:href="@{/auth/logout}" class="nav-icon text-decoration-none" title="Đăng xuất">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="saved-wrapper">
        <!-- Header -->
        <div class="saved-header">
            <a th:href="@{/home}" class="back-btn" title="Quay lại trang chủ">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="saved-title">
                <i class="bi bi-bookmark-heart-fill"></i>
                Bài viết đã lưu
            </div>
            <span class="saved-count" th:text="${savedPosts != null ? savedPosts.size() + ' bài' : '0 bài'}">0
                bài</span>
        </div>

        <!-- Empty state -->
        <div th:if="${savedPosts == null or savedPosts.empty}" class="saved-empty">
            <i class="bi bi-bookmark-x"></i>
            <h4>Chưa có bài viết nào được lưu</h4>
            <p>Hãy khám phá và lưu những tác phẩm bạn yêu thích!</p>
            <a th:href="@{/home}">
                <i class="bi bi-compass me-1"></i> Khám phá ngay
            </a>
        </div>

        <!-- Gallery grid -->
        <div class="saved-grid" th:if="${savedPosts != null and !savedPosts.empty}">
            <div th:each="p : ${savedPosts}" class="saved-card">
                <div class="card-img-wrap">
                    <a th:href="@{/post/{id}(id=${p.id})}">
                        <img th:if="${p.imageData != null}" th:src="@{/upload/image/{id}(id=${p.id})}" class="card-img"
                            alt="post">
                        <img th:if="${p.imageData == null and p.imageUrl != null}" th:src="${p.imageUrl}"
                            class="card-img" alt="post">
                        <div th:if="${p.imageData == null and p.imageUrl == null}" class="card-no-img">
                            <i class="bi bi-image"></i>
                        </div>
                    </a>
                    <div class="card-overlay">
                        <div class="card-stats">
                            <span class="stat-chip likes">
                                <i class="bi bi-heart-fill"></i>
                                <span th:text="${p.likesCount}">0</span>
                            </span>
                            <span class="stat-chip views">
                                <i class="bi bi-eye-fill"></i>
                                <span th:text="${p.views}">0</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="card-body">
                    <a th:href="@{/post/{id}(id=${p.id})}" class="card-title" th:text="${p.title}">Tiêu đề</a>
                    <a th:href="@{/profile/view/{id}(id=${p.user.id})}" class="card-author">
                        <img th:if="${p.user.avatarData != null}" th:src="@{/profile/avatar/{id}(id=${p.user.id})}"
                            class="author-avatar-sm" alt="">
                        <div th:if="${p.user.avatarData == null}" class="author-dot-sm"
                            th:text="${p.user.username.substring(0,1).toUpperCase()}">U</div>
                        <span class="author-name" th:text="'@' + ${p.user.username}">@user</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        // Background
        const bgUrl = document.body.getAttribute('data-homebg');
        if (bgUrl && bgUrl.trim()) {
            document.body.style.background = `url('${bgUrl}') no-repeat center center fixed`;
            document.body.style.backgroundSize = 'cover';
            document.getElementById('homeBgOverlay').style.display = 'block';
        }

        // ===== NOTIFICATION BADGE =====
        const notifBadge = document.getElementById('notifBadge');
        function updateBadge(count) {
            if (!notifBadge) return;
            if (count > 0) { notifBadge.textContent = count > 99 ? '99+' : count; notifBadge.style.display = ''; }
            else { notifBadge.style.display = 'none'; }
        }
        fetch('/api/notifications/count').then(r => r.json()).then(d => updateBadge(d.count || 0)).catch(() => { });

        // ===== MESSAGE BADGE =====
        const msgBadge = document.getElementById('msgBadge');
        function updateMsgBadge(count) {
            if (!msgBadge) return;
            if (count > 0) { msgBadge.textContent = count > 99 ? '99+' : count; msgBadge.style.display = ''; }
            else { msgBadge.style.display = 'none'; }
        }
        fetch('/chat/unread-count').then(r => r.json()).then(d => updateMsgBadge(d.count || 0)).catch(() => { });

        // ===== WEBSOCKET STOMP =====
        const currentUserId = /*[[${sessionUser != null ? sessionUser.id : 0}]]*/ 0;
        if (currentUserId > 0) {
            try {
                const sock = new SockJS('/ws');
                const stompClient = Stomp.over(sock);
                stompClient.debug = null;
                stompClient.connect({}, function () {
                    stompClient.subscribe('/topic/user-' + currentUserId, function (msg) {
                        const notif = JSON.parse(msg.body);
                        const cur = parseInt(notifBadge ? notifBadge.textContent : '0') || 0;
                        updateBadge(cur + 1);
                        showNotifToast(notif);
                    });
                }, function (err) { console.log('WS error:', err); });
            } catch (e) { }
        }

        function showNotifToast(notif) {
            const existing = document.querySelector('.notif-toast');
            if (existing) existing.remove();
            const ICONS = { 'FOLLOW': '👤', 'NEW_POST': '🖼️', 'COMMENT': '💬', 'POST_DELETED': '🗑️', 'POST_REPORTED': '🚩' };
            const toast = document.createElement('div');
            toast.className = 'notif-toast';
            toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:#1a1a1a;border:1px solid #e91e63;border-radius:14px;padding:14px 18px;max-width:320px;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;gap:12px;align-items:flex-start;animation:slideInRight 0.3s ease;';
            toast.innerHTML = `<span style="font-size:1.4rem;">${ICONS[notif.type] || '🔔'}</span><div><div style="color:#fff;font-size:0.875rem;font-weight:600;margin-bottom:2px;">Thông báo mới</div><div style="color:#bbb;font-size:0.82rem;">${notif.message}</div></div>`;
            toast.addEventListener('click', () => window.location.href = notif.link || '/notifications');
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        const _style = document.createElement('style');
        _style.textContent = '@keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}';
        document.head.appendChild(_style);
    </script>
</body>

</html>
