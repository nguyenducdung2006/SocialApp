<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tin nhắn - SocialApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <style>
        /* ===== CHAT LAYOUT ===== */
        * {
            box-sizing: border-box;
        }

        body {
            background: #0e0e10;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .chat-wrapper {
            display: flex;
            height: 100vh;
            padding-top: 56px;
        }

        /* ===== LEFT SIDEBAR ===== */
        .chat-sidebar {
            width: 340px;
            min-width: 340px;
            background: #1a1a1f;
            border-right: 1px solid #2a2a35;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-sidebar-header {
            padding: 18px 20px 12px;
            border-bottom: 1px solid #2a2a35;
        }

        .chat-sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 12px;
        }

        .chat-search {
            position: relative;
        }

        .chat-search input {
            width: 100%;
            background: #2a2a35;
            border: none;
            border-radius: 20px;
            padding: 8px 16px 8px 38px;
            color: #e0e0e0;
            font-size: 0.9rem;
            outline: none;
            transition: background 0.2s;
        }

        .chat-search input:focus {
            background: #35354a;
        }

        .chat-search input::placeholder {
            color: #888;
        }

        .chat-search i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 0.85rem;
        }

        .conv-list {
            overflow-y: auto;
            flex: 1;
            padding: 8px 0;
        }

        .conv-list::-webkit-scrollbar {
            width: 4px;
        }

        .conv-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .conv-list::-webkit-scrollbar-thumb {
            background: #3a3a4a;
            border-radius: 2px;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 10px;
            margin: 2px 8px;
            transition: background 0.15s;
            text-decoration: none;
            color: inherit;
        }

        .conv-item:hover {
            background: #25252f;
            color: inherit;
        }

        .conv-item.active {
            background: #2a1a3a;
            border-left: 3px solid #a855f7;
        }

        .conv-avatar {
            position: relative;
            flex-shrink: 0;
        }

        .conv-avatar img,
        .conv-avatar .avatar-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .conv-avatar .avatar-placeholder {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #1a1a1f;
        }

        .conv-info {
            flex: 1;
            min-width: 0;
        }

        .conv-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: 0.82rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .conv-preview.unread {
            color: #e0e0e0;
            font-weight: 600;
        }

        .conv-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .conv-time {
            font-size: 0.75rem;
            color: #666;
        }

        .unread-badge {
            background: #a855f7;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        /* ===== CHAT MAIN ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0e0e10;
        }

        /* Empty state */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            gap: 16px;
        }

        .chat-empty i {
            font-size: 4rem;
            color: #a855f7;
            opacity: 0.5;
        }

        .chat-empty p {
            font-size: 1.1rem;
        }

        /* Chat header */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            background: #1a1a1f;
            border-bottom: 1px solid #2a2a35;
            flex-shrink: 0;
        }

        .chat-header-avatar img,
        .chat-header-avatar .avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header-avatar .avatar-placeholder {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
        }

        .chat-header-status {
            font-size: 0.8rem;
            color: #888;
        }

        .chat-header-actions {
            display: flex;
            gap: 8px;
        }

        .chat-header-actions a {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2a2a35;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a855f7;
            text-decoration: none;
            transition: background 0.2s;
            font-size: 1rem;
        }

        .chat-header-actions a:hover {
            background: #35354a;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2a35;
            border-radius: 2px;
        }

        /* Date separator */
        .date-label {
            text-align: center;
            color: #555;
            font-size: 0.75rem;
            margin: 12px 0 8px;
            position: relative;
        }

        .date-label::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: #2a2a35;
        }

        .date-label span {
            background: #0e0e10;
            padding: 0 12px;
            position: relative;
        }

        /* Message bubble */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-bottom: 2px;
        }

        .msg-row.mine {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
        }

        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .msg-avatar .small-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
        }

        .msg-bubble {
            max-width: 60%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
            position: relative;
        }

        /* Other person's bubble */
        .msg-row:not(.mine) .msg-bubble {
            background: #2a2a35;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        /* My bubble */
        .msg-row.mine .msg-bubble {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #555;
            white-space: nowrap;
            padding: 0 4px;
            align-self: flex-end;
        }

        /* Group: same sender consecutive */
        .msg-row.grouped .msg-bubble {
            border-radius: 18px;
        }

        .msg-row.grouped:not(.mine) .msg-bubble {
            border-bottom-left-radius: 4px;
        }

        .msg-row.grouped.mine .msg-bubble {
            border-bottom-right-radius: 4px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin-top: 4px;
        }

        .typing-dots {
            background: #2a2a35;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #888;
            animation: typing-bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing-bounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        /* Input area */
        .chat-input-area {
            padding: 14px 20px;
            background: #1a1a1f;
            border-top: 1px solid #2a2a35;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .chat-input-wrap {
            flex: 1;
            background: #2a2a35;
            border-radius: 22px;
            display: flex;
            align-items: center;
            padding: 4px 8px 4px 16px;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .chat-input-wrap:focus-within {
            border-color: #a855f7;
        }

        #msgInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-size: 0.92rem;
            padding: 6px 0;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
        }

        #msgInput::placeholder {
            color: #666;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.08);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== NAVBAR override ===== */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .chat-sidebar {
                width: 100%;
                min-width: unset;
                display: none;
            }

            .chat-sidebar.show-mobile {
                display: flex;
            }

            .chat-main {
                display: flex;
            }
        }
    </style>
</head>

<body>
    <!-- NAVBAR (reuse from home) -->
    <nav class="top-navbar">
        <a class="brand" th:href="@{/home}">✦ SocialApp</a>
        <div class="d-flex align-items-center gap-2 ms-auto" style="padding-right:12px;">
            <!-- Chat icon (active) -->
            <a th:href="@{/chat}" class="nav-icon-btn position-relative" title="Tin nhắn" style="color:#a855f7;">
                <i class="bi bi-chat-dots-fill"></i>
            </a>
            <!-- Notifications -->
            <a th:href="@{/notifications}" class="nav-icon-btn position-relative" title="Thông báo">
                <i class="bi bi-bell"></i>
                <span id="notifBadge" class="notif-badge" style="display:none;"></span>
            </a>
            <!-- Profile -->
            <a th:href="@{/profile}" class="nav-icon-btn" title="Trang cá nhân">
                <i class="bi bi-person-circle"></i>
            </a>
            <!-- Home -->
            <a th:href="@{/home}" class="nav-icon-btn" title="Trang chủ">
                <i class="bi bi-house"></i>
            </a>
        </div>
    </nav>

    <div class="chat-wrapper">
        <!-- LEFT SIDEBAR: Conversations -->
        <div class="chat-sidebar">
            <div class="chat-sidebar-header">
                <h2><i class="bi bi-chat-dots-fill me-2" style="color:#a855f7;"></i>Tin nhắn</h2>
                <div class="chat-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" placeholder="Tìm kiếm cuộc trò chuyện...">
                </div>
            </div>

            <div class="conv-list" id="convList">
                <!-- Nếu không có conversation nào -->
                <div th:if="${conversations == null or conversations.empty}"
                    style="padding:32px 16px;text-align:center;color:#555;">
                    <i class="bi bi-chat-square-text"
                        style="font-size:2.5rem;display:block;margin-bottom:8px;color:#a855f7;opacity:0.4;"></i>
                    <p style="font-size:0.9rem;">Chưa có cuộc trò chuyện nào</p>
                </div>

                <a th:each="conv : ${conversations}" th:href="@{/chat/{id}(id=${conv.user.id})}" class="conv-item"
                    th:classappend="${activeChatUser != null and activeChatUser.id == conv.user.id} ? 'active' : ''">
                    <div class="conv-avatar">
                        <img th:if="${conv.user.avatarData != null}"
                            th:src="@{/profile/avatar/{id}(id=${conv.user.id})}" th:alt="${conv.user.username}">
                        <div th:unless="${conv.user.avatarData != null}" class="avatar-placeholder">
                            <span
                                th:text="${(conv.user.fullName != null and conv.user.fullName.length() > 0) ? conv.user.fullName.substring(0,1).toUpperCase() : (conv.user.username != null and conv.user.username.length() > 0 ? conv.user.username.substring(0,1).toUpperCase() : 'U')}">U</span>
                        </div>
                    </div>
                    <div class="conv-info">
                        <div class="conv-name"
                            th:text="${conv.user.fullName != null ? conv.user.fullName : conv.user.username}">Tên</div>
                        <div class="conv-preview" th:classappend="${conv.unread > 0} ? 'unread' : ''"
                            th:text="${conv.isMine ? 'Bạn: ' + conv.lastMessage : conv.lastMessage}">...</div>
                    </div>
                    <div class="conv-meta">
                        <span class="conv-time" th:if="${conv.lastTime != null}"
                            th:text="${#temporals.format(conv.lastTime, 'HH:mm')}"></span>
                        <span class="unread-badge" th:if="${conv.unread > 0}" th:text="${conv.unread}"></span>
                    </div>
                </a>
            </div>
        </div>

        <!-- RIGHT: Chat Area -->
        <div class="chat-main">
            <!-- Empty state: chưa chọn ai -->
            <div th:if="${activeChatUser == null}" class="chat-empty">
                <i class="bi bi-chat-heart"></i>
                <p>Chọn một cuộc trò chuyện để bắt đầu</p>
                <small style="color:#444;">Hoặc <a th:href="@{/home}" style="color:#a855f7;">tìm bạn bè</a> trên trang
                    chủ</small>
            </div>

            <!-- Active chat -->
            <div th:if="${activeChatUser != null}" style="display:flex;flex-direction:column;height:100%;">
                <!-- Header -->
                <div class="chat-header">
                    <div class="chat-header-avatar">
                        <img th:if="${activeChatUser.avatarData != null}"
                            th:src="@{/profile/avatar/{id}(id=${activeChatUser.id})}"
                            th:alt="${activeChatUser.username}">
                        <div th:unless="${activeChatUser.avatarData != null}" class="avatar-placeholder">
                            <span
                                th:text="${(activeChatUser.fullName != null and activeChatUser.fullName.length() > 0) ? activeChatUser.fullName.substring(0,1).toUpperCase() : (activeChatUser.username != null and activeChatUser.username.length() > 0 ? activeChatUser.username.substring(0,1).toUpperCase() : 'U')}">U</span>
                        </div>
                    </div>
                    <div class="chat-header-info">
                        <div class="chat-header-name"
                            th:text="${activeChatUser.fullName != null ? activeChatUser.fullName : activeChatUser.username}">
                            Tên</div>
                        <div class="chat-header-status" id="typingStatus">Nhấn để xem trang cá nhân</div>
                    </div>
                    <div class="chat-header-actions">
                        <a th:href="@{/user/{id}(id=${activeChatUser.id})}" title="Trang cá nhân">
                            <i class="bi bi-person"></i>
                        </a>
                    </div>
                </div>

                <!-- Messages -->
                <div class="messages-area" id="messagesArea">
                    <div th:each="msg, iterStat : ${messages}" class="msg-row"
                        th:classappend="${msg.sender.id == me.id} ? 'mine' : ''">

                        <!-- Avatar (chỉ show nếu không phải mình) -->
                        <div class="msg-avatar" th:if="${msg.sender.id != me.id}">
                            <img th:if="${activeChatUser.avatarData != null}"
                                th:src="@{/profile/avatar/{id}(id=${activeChatUser.id})}">
                            <div th:unless="${activeChatUser.avatarData != null}" class="small-placeholder">
                                <span
                                    th:text="${(activeChatUser.fullName != null and activeChatUser.fullName.length() > 0) ? activeChatUser.fullName.substring(0,1).toUpperCase() : (activeChatUser.username != null and activeChatUser.username.length() > 0 ? activeChatUser.username.substring(0,1).toUpperCase() : 'U')}">U</span>
                            </div>
                        </div>

                        <div class="msg-bubble" th:text="${msg.content}">nội dung</div>
                        <div class="msg-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm')}">12:00</div>
                    </div>

                    <!-- Typing indicator (hidden by default) -->
                    <div class="typing-indicator" id="typingIndicator" style="display:none;">
                        <div class="msg-avatar">
                            <img th:if="${activeChatUser != null and activeChatUser.avatarData != null}"
                                th:src="@{/profile/avatar/{id}(id=${activeChatUser.id})}">
                            <div class="small-placeholder"
                                th:unless="${activeChatUser == null or activeChatUser.avatarData == null}">
                                <span th:if="${activeChatUser != null}"
                                    th:text="${(activeChatUser.fullName != null and activeChatUser.fullName.length() > 0) ? activeChatUser.fullName.substring(0,1).toUpperCase() : (activeChatUser.username != null and activeChatUser.username.length() > 0 ? activeChatUser.username.substring(0,1).toUpperCase() : 'U')}">U</span>
                            </div>
                        </div>
                        <div class="typing-dots">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>

                <!-- Input Bar -->
                <div class="chat-input-area">
                    <div class="chat-input-wrap">
                        <textarea id="msgInput" rows="1" placeholder="Nhập tin nhắn..."
                            style="line-height:1.4;"></textarea>
                    </div>
                    <button class="send-btn" id="sendBtn" title="Gửi">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- WebSocket data -->
    <div id="wsData" style="display:none;" th:data-my-id="${me.id}"
        th:data-my-name="${me.fullName != null ? me.fullName : me.username}"
        th:data-other-id="${activeChatUser != null ? activeChatUser.id : ''}"
        th:data-other-name="${activeChatUser != null ? (activeChatUser.fullName != null ? activeChatUser.fullName : activeChatUser.username) : ''}"
        th:data-other-has-avatar="${activeChatUser != null && activeChatUser.avatarData != null ? 'true' : 'false'}">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        const wsData = document.getElementById('wsData');
        const myId = wsData && wsData.dataset.myId ? parseInt(wsData.dataset.myId) : null;
        const otherId = wsData && wsData.dataset.otherId ? parseInt(wsData.dataset.otherId) : null;
        const myName = wsData ? wsData.dataset.myName : '';
        const otherName = wsData ? wsData.dataset.otherName : '';

        const msgArea = document.getElementById('messagesArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingTip = document.getElementById('typingIndicator');
        const typingStatus = document.getElementById('typingStatus');
        const notifBadge = document.getElementById('notifBadge');

        let stompClient = null;
        let typingTimeout = null;
        let isTyping = false;

        // ===== STOMP CONNECT =====
        function connectWS() {
            if (!myId) return;
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;
            stompClient.connect({}, () => {
                // Subscribe kênh chat của mình
                stompClient.subscribe('/topic/chat-' + myId, (frame) => {
                    const data = JSON.parse(frame.body);
                    if (data.typing !== undefined) {
                        handleTypingIndicator(data);
                    } else {
                        handleIncomingMessage(data);
                    }
                });

                // Subscribe notification badge
                stompClient.subscribe('/topic/user-' + myId, (frame) => {
                    updateNotifBadge();
                });
            }, () => {
                setTimeout(connectWS, 3000);
            });
        }

        // ===== INCOMING MESSAGE =====
        function handleIncomingMessage(data) {
            // Chỉ hiện nếu đang chat với người đó
            if (otherId && (data.senderId === otherId || data.senderId === myId)) {
                appendMessage(data);
                scrollBottom();

                // Nếu là tin từ người khác → đánh dấu đã đọc
                if (data.senderId === otherId) {
                    fetch('/chat/' + otherId + '/read', { method: 'POST' });
                }
            } else {
                // Update danh sách hội thoại bên trái (badge)
                updateConvPreview(data);
            }
        }

        function handleTypingIndicator(data) {
            if (!typingTip || data.senderId !== otherId) return;
            if (data.typing) {
                typingTip.style.display = 'flex';
                scrollBottom();
            } else {
                typingTip.style.display = 'none';
            }
        }

        // ===== APPEND MESSAGE BUBBLE =====
        function appendMessage(data) {
            const isMine = data.senderId === myId;
            const row = document.createElement('div');
            row.className = 'msg-row' + (isMine ? ' mine' : '');

            if (!isMine) {
                // Avatar
                const avWrap = document.createElement('div');
                avWrap.className = 'msg-avatar';

                const hasAvatar = wsData && wsData.dataset.otherHasAvatar === 'true';
                if (hasAvatar) {
                    avWrap.innerHTML = `<img src="/profile/avatar/${otherId}">`;
                } else {
                    avWrap.innerHTML = `<div class="small-placeholder">${otherName.charAt(0).toUpperCase()}</div>`;
                }
                row.appendChild(avWrap);
            }

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = data.content;
            row.appendChild(bubble);

            const timeEl = document.createElement('div');
            timeEl.className = 'msg-time';
            timeEl.textContent = data.sentAt || now();
            row.appendChild(timeEl);

            // Insert before typing indicator
            if (typingTip && typingTip.parentNode === msgArea) {
                msgArea.insertBefore(row, typingTip);
            } else if (msgArea) {
                msgArea.appendChild(row);
            }
        }

        function now() {
            const d = new Date();
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function scrollBottom() {
            if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
        }

        // ===== SEND MESSAGE =====
        function sendMessage() {
            if (!stompClient || !stompClient.connected) return;
            const content = (msgInput ? msgInput.value : '').trim();
            if (!content || !myId || !otherId) return;

            stompClient.send('/app/chat.send', {}, JSON.stringify({
                senderId: myId,
                receiverId: otherId,
                content: content
            }));

            if (msgInput) {
                msgInput.value = '';
                msgInput.style.height = 'auto';
            }
            sendTyping(false);
        }

        // ===== TYPING =====
        function sendTyping(state) {
            if (!stompClient || !stompClient.connected || !myId || !otherId) return;
            if (isTyping === state) return;
            isTyping = state;
            stompClient.send('/app/chat.typing', {}, JSON.stringify({
                senderId: myId,
                receiverId: otherId,
                typing: state
            }));
        }

        // ===== NOTIFICATION BADGE =====
        function updateNotifBadge() {
            fetch('/notifications/count').then(r => r.json()).then(d => {
                if (notifBadge) {
                    if (d.count > 0) {
                        notifBadge.textContent = d.count > 9 ? '9+' : d.count;
                        notifBadge.style.display = 'flex';
                    } else {
                        notifBadge.style.display = 'none';
                    }
                }
            }).catch(() => { });
        }

        function updateConvPreview(data) {
            // Reload sidebar conversation preview nếu cần
            // Đơn giản là reload page sau vài giây nếu tab không active
        }

        // ===== EVENT LISTENERS =====
        if (sendBtn) sendBtn.addEventListener('click', sendMessage);

        if (msgInput) {
            // Enter to send (Shift+Enter = newline)
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Typing indicator
            msgInput.addEventListener('input', () => {
                // Auto-resize
                msgInput.style.height = 'auto';
                msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';

                // Send typing
                if (msgInput.value.length > 0) {
                    sendTyping(true);
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => sendTyping(false), 2000);
                } else {
                    sendTyping(false);
                }
            });
        }

        // Search filter conversations
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.toLowerCase();
                document.querySelectorAll('.conv-item').forEach(item => {
                    const name = item.querySelector('.conv-name')?.textContent.toLowerCase() || '';
                    item.style.display = name.includes(q) ? '' : 'none';
                });
            });
        }

        // Init
        connectWS();
        scrollBottom();
        updateNotifBadge();
    </script>
</body>

</html>
