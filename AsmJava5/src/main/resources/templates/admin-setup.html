<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Khởi tạo Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0e0e10;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .setup-box {
            background-color: #1a1a1f;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a35;
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            background-color: #2a2a35;
            border: 1px solid #444;
            color: #fff;
        }

        .form-control:focus {
            background-color: #353545;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(168, 85, 247, 0.25);
            border-color: #a855f7;
        }

        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            border: none;
            font-weight: bold;
            width: 100%;
            padding: 12px;
        }

        .btn-purple:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="setup-box">
        <div class="text-center mb-4">
            <h3 style="color: #a855f7; font-weight: 800;">SOCIAL APP</h3>
            <p class="text-muted">Tạo tài khoản Quản Trị Viên (Admin)</p>
            <small class="text-warning">Chức năng này chỉ khả dụng trên localhost</small>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/internal/admin-setup}" method="post">
            <div class="mb-3">
                <label class="form-label text-muted">Họ và Tên</label>
                <input type="text" name="fullName" class="form-control" required placeholder="Ví dụ: Quản Trị Hệ Thống">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Tên đăng nhập (Username)</label>
                <input type="text" name="username" class="form-control" required placeholder="Ví dụ: superadmin">
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">Email</label>
                <input type="email" name="email" class="form-control" required placeholder="Ví dụ: admin@socialapp.com">
            </div>
            <div class="mb-4">
                <label class="form-label text-muted">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn btn-purple rounded-pill">Tạo Tài Khoản Admin</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/auth/login}" class="text-decoration-none" style="color: #a855f7;">Quay lại đăng nhập</a>
        </div>
    </div>

</body>

</html>
